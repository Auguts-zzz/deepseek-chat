<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek · 0427-04</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #e9eef4; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 0; }
        .app { max-width: 100%; width: 100%; background: white; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { background: #ffffffdd; backdrop-filter: blur(12px); padding: 12px 16px; border-bottom: 1px solid #eef2f0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; justify-content: space-between; }
        .conv-control { display: flex; align-items: center; gap: 8px; background: #f0f2f5; border-radius: 40px; padding: 4px 12px; flex-wrap: wrap; }
        .conv-name { font-weight: 600; font-size: 0.9rem; color: #1f5e6e; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .icon-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 6px; border-radius: 30px; width: 32px; height: 32px; }
        .icon-btn:active { background: #e0e4ea; }
        .api-section { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .api-input { background: #f0f2f5; border: 1px solid #dce3ec; border-radius: 40px; padding: 6px 12px; font-size: 0.7rem; width: 140px; font-family: monospace; }
        .small-btn { background: #eef2f7; border: none; border-radius: 30px; padding: 5px 12px; font-size: 0.7rem; cursor: pointer; }
        .mode-switch { display: flex; align-items: center; gap: 6px; background: #eef2f7; padding: 0 10px; border-radius: 40px; height: 32px; font-size: 0.7rem; }
        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; background: #fefefe; }
        .message { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .user-message { align-self: flex-end; }
        .assistant-message { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 22px; line-height: 1.45; font-size: 0.9rem; word-wrap: break-word; white-space: pre-wrap; }
        .user-message .bubble { background: #1f7e8c; color: white; border-bottom-right-radius: 6px; }
        .assistant-message .bubble { background: #eef2fa; color: #1a2c3e; border-bottom-left-radius: 6px; }
        .message-actions { display: flex; gap: 12px; margin-top: 4px; margin-left: 12px; font-size: 0.65rem; flex-wrap: wrap; }
        .action-btn { background: transparent; border: none; color: #6c7a91; cursor: pointer; padding: 4px 6px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
        .action-btn:active { background: #e2e8f0; }
        .message-time { font-size: 0.55rem; color: #8d9aae; margin-top: 4px; margin-left: 12px; }
        .loading-bubble { background: #eef2fa; padding: 10px 16px; border-radius: 24px; display: flex; gap: 6px; width: fit-content; }
        .dot { width: 8px; height: 8px; background: #8f9bb3; border-radius: 50%; animation: wave 1.2s infinite; }
        @keyframes wave { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
        .input-area { background: white; border-top: 1px solid #eef2f0; padding: 12px 16px 16px; display: flex; gap: 10px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: #f4f7fb; border-radius: 32px; padding: 8px 16px; border: 1px solid #e2e8f0; }
        textarea { width: 100%; border: none; background: transparent; resize: none; font-size: 0.9rem; font-family: inherit; outline: none; max-height: 100px; }
        .send-btn { background: #1f7e8c; border: none; width: 44px; height: 44px; border-radius: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 1.2rem; }
        .send-btn.disabled { opacity: 0.5; pointer-events: none; }
        /* 自定义编辑模态框 */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .edit-modal-content {
            background: white;
            width: 85%;
            max-width: 400px;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .edit-modal-content textarea {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 16px;
            padding: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            margin: 12px 0;
            resize: vertical;
        }
        .edit-modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .edit-modal-buttons button {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            background: #eef2f7;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .edit-modal-buttons button:first-child { background: #1f7e8c; color: white; }
        .modal, .version-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content, .version-modal-content { background: white; width: 85%; max-width: 320px; border-radius: 28px; padding: 20px; max-height: 70%; overflow-y: auto; }
        .modal-header { font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .conv-list, .version-list { list-style: none; }
        .conv-list li, .version-list li { padding: 12px 8px; border-bottom: 1px solid #eef2f0; display: flex; justify-content: space-between; align-items: center; }
        .conv-title, .version-title { cursor: pointer; flex: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .del-conv { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #c23d3d; padding: 0 8px; }
        .new-conv-btn { background: #1f7e8c; color: white; border: none; border-radius: 40px; padding: 8px; width: 100%; margin-top: 12px; font-size: 0.9rem; cursor: pointer; }
        .footer-note { font-size: 0.6rem; text-align: center; padding: 8px; color: #95a5bc; background: #ffffffcc; }
        @media (max-width: 550px) { .api-input { width: 110px; } .conv-name { max-width: 120px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="conv-control">
            <button id="showConvListBtn" class="icon-btn">📋</button>
            <span id="currentConvName" class="conv-name">对话</span>
            <button id="newConvBtn" class="icon-btn">➕</button>
            <button id="keepTwoRoundsBtn" class="small-btn" style="background:#ffd966;">✂️ 保留最近2轮并清除历史</button>
            <button id="exportBackupBtn" class="small-btn">💾 备份</button>
            <button id="importBackupBtn" class="small-btn">📂 恢复</button>
        </div>
        <div class="api-section">
            <input type="password" id="apiKeyInput" class="api-input" placeholder="API Key" autocomplete="off">
            <button id="saveApiBtn" class="small-btn">保存</button>
            <div class="mode-switch">
                <span>🧠 深度思考</span>
                <input type="checkbox" id="deepThinkToggle">
            </div>
        </div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="message assistant-message">
            <div class="bubble">✨ 加载中...</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送)"></textarea>
        </div>
        <button id="sendButton" class="send-btn">➤</button>
    </div>
    <div class="footer-note">🔒 编辑消息会自动预填原内容（自定义对话框，手机完美支持）</div>
</div>

<!-- 自定义编辑模态框 -->
<div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
        <div style="font-weight:600; margin-bottom:8px;">编辑消息</div>
        <textarea id="editTextarea" rows="4"></textarea>
        <div class="edit-modal-buttons">
            <button id="editConfirmBtn">确定</button>
            <button id="editCancelBtn">取消</button>
        </div>
    </div>
</div>

<div id="convModal" class="modal"><div class="modal-content"><div class="modal-header"><span>📁 我的对话</span><button id="closeModalBtn" class="icon-btn">✖️</button></div><ul id="convListUl"></ul><button id="modalNewConvBtn" class="new-conv-btn">➕ 新建对话</button></div></div>
<div id="msgHistoryModal" class="modal"><div class="modal-content"><div class="modal-header"><span>📜 消息历史版本</span><button id="closeHistoryModalBtn" class="icon-btn">✖️</button></div><ul id="historyListUl" class="version-list"></ul></div></div>

<script>
(function(){
    // ---------- 配置 ----------
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const SYSTEM_MESSAGE = { role: "system", content: "你是DeepSeek助手，扮演角色进行对话，保持一致性，使用中文。" };
    
    let conversations = [];
    let activeConvId = null;
    let currentApiKey = "";
    let currentModel = "deepseek-chat";
    let isLoading = false;

    // 编辑待处理变量
    let pendingEdit = { idx: null, callback: null };

    // DOM 元素
    const msgContainer = document.getElementById("messagesContainer");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendButton");
    const apiInput = document.getElementById("apiKeyInput");
    const saveApiBtn = document.getElementById("saveApiBtn");
    const toggleDeep = document.getElementById("deepThinkToggle");
    const convNameSpan = document.getElementById("currentConvName");
    const showConvListBtn = document.getElementById("showConvListBtn");
    const newConvBtn = document.getElementById("newConvBtn");
    const keepTwoRoundsBtn = document.getElementById("keepTwoRoundsBtn");
    const exportBackupBtn = document.getElementById("exportBackupBtn");
    const importBackupBtn = document.getElementById("importBackupBtn");
    const convModal = document.getElementById("convModal");
    const msgHistoryModal = document.getElementById("msgHistoryModal");
    const convListUl = document.getElementById("convListUl");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalNewConvBtn = document.getElementById("modalNewConvBtn");
    const closeHistoryModalBtn = document.getElementById("closeHistoryModalBtn");
    const historyListUl = document.getElementById("historyListUl");
    const editModal = document.getElementById("editModal");
    const editTextarea = document.getElementById("editTextarea");
    const editConfirmBtn = document.getElementById("editConfirmBtn");
    const editCancelBtn = document.getElementById("editCancelBtn");

    // ---------- 存储核心 ----------
    function saveAll() {
        try {
            localStorage.setItem("ds_conversations", JSON.stringify(conversations));
            localStorage.setItem("ds_activeConvId", activeConvId);
        } catch(e) { console.warn(e); }
    }

    function normalizeConversation(conv) {
        if (!conv.messages) conv.messages = [];
        for (let msg of conv.messages) {
            if (!msg.history) msg.history = [];
        }
        if (!conv.title) conv.title = "对话";
        return conv;
    }

    function loadAllData() {
        let loaded = false;
        const saved = localStorage.getItem("ds_conversations");
        if (saved) {
            try {
                let parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length) {
                    conversations = parsed.map(c => normalizeConversation(c));
                    loaded = true;
                }
            } catch(e) {}
        }
        if (!loaded) {
            conversations = [{
                id: Date.now(),
                title: "新对话",
                messages: [{ role: "assistant", content: "✨ 欢迎！编辑消息时会自动弹出预填内容的对话框。", history: [] }]
            }];
        }
        const savedActive = localStorage.getItem("ds_activeConvId");
        if (savedActive && conversations.some(c => c.id == savedActive)) {
            activeConvId = parseInt(savedActive);
        } else {
            activeConvId = conversations[0].id;
        }
        const curr = conversations.find(c => c.id === activeConvId);
        if (curr && (!curr.messages || curr.messages.length === 0)) {
            curr.messages = [{ role: "assistant", content: "✨ 欢迎！编辑消息时会自动弹出预填内容的对话框。", history: [] }];
        }
        saveAll();
        renderMessages();
        updateTitle();
    }

    function getCurrentConv() { return conversations.find(c => c.id === activeConvId); }
    function getCurrentMessages() { const conv = getCurrentConv(); return conv ? conv.messages : []; }
    function saveCurrentMessages(messages) {
        const conv = getCurrentConv();
        if (conv) {
            conv.messages = messages;
            const firstUser = messages.find(m => m.role === "user");
            if (firstUser && (conv.title === "新对话" || !conv.title)) {
                let newTitle = firstUser.content.slice(0, 20);
                if (newTitle.length < 1) newTitle = "对话";
                conv.title = newTitle;
            }
            saveAll();
            renderMessages();
            updateTitle();
        }
    }

    function pushHistory(msg, oldContent) {
        if (!msg.history) msg.history = [];
        if (msg.history.length === 0 || msg.history[msg.history.length-1] !== oldContent) {
            msg.history.push(oldContent);
            if (msg.history.length > 20) msg.history.shift();
        }
    }

    // 显示自定义编辑对话框
    function showEditModal(idx, originalContent) {
        pendingEdit.idx = idx;
        editTextarea.value = originalContent;
        editModal.style.display = "flex";
    }

    function closeEditModal() {
        editModal.style.display = "none";
        pendingEdit.idx = null;
    }

    async function confirmEdit() {
        const newContent = editTextarea.value.trim();
        if (newContent === "") {
            closeEditModal();
            return;
        }
        const idx = pendingEdit.idx;
        closeEditModal();
        const messages = getCurrentMessages();
        if (idx >= messages.length) return;
        const msg = messages[idx];
        pushHistory(msg, msg.content);
        msg.content = newContent;
        const newMessages = messages.slice(0, idx+1);
        saveCurrentMessages(newMessages);
        await regenerateAfterEdit(newMessages);
    }

    function renderMessages() {
        const messages = getCurrentMessages();
        msgContainer.innerHTML = "";
        if (messages.length === 0) {
            msgContainer.innerHTML = `<div class="message assistant-message"><div class="bubble">开始对话吧～</div></div>`;
            return;
        }
        messages.forEach((msg, idx) => {
            const isUser = msg.role === "user";
            const div = document.createElement("div");
            div.className = `message ${isUser ? "user-message" : "assistant-message"}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerText = msg.content;
            div.appendChild(bubble);
            const actions = document.createElement("div");
            actions.className = "message-actions";
            // 复制
            const copyBtn = document.createElement("button");
            copyBtn.className = "action-btn";
            copyBtn.innerHTML = "📋 复制";
            copyBtn.onclick = async (e) => {
                e.stopPropagation();
                await navigator.clipboard.writeText(msg.content);
                copyBtn.innerHTML = "✅";
                setTimeout(() => copyBtn.innerHTML = "📋 复制", 1000);
            };
            actions.appendChild(copyBtn);
            // 历史
            const historyBtn = document.createElement("button");
            historyBtn.className = "action-btn";
            historyBtn.innerHTML = "📜 历史";
            historyBtn.onclick = (e) => {
                e.stopPropagation();
                showMessageHistory(idx, msg.content, msg.history || []);
            };
            actions.appendChild(historyBtn);
            // 编辑（仅用户） - 使用自定义模态框
            if (isUser) {
                const editBtn = document.createElement("button");
                editBtn.className = "action-btn";
                editBtn.innerHTML = "✏️ 编辑";
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    const currentMessages = getCurrentMessages();
                    if (idx < currentMessages.length) {
                        showEditModal(idx, currentMessages[idx].content);
                    }
                };
                actions.appendChild(editBtn);
            }
            // 重新生成（仅最后一条AI）
            if (!isUser) {
                const lastAssistantIdx = messages.reduce((last, m, i) => m.role === "assistant" ? i : last, -1);
                if (idx === lastAssistantIdx) {
                    const regenBtn = document.createElement("button");
                    regenBtn.className = "action-btn";
                    regenBtn.innerHTML = "🔄 重新生成";
                    regenBtn.onclick = (e) => {
                        e.stopPropagation();
                        regenerateLastAssistant();
                    };
                    actions.appendChild(regenBtn);
                }
            }
            div.appendChild(actions);
            const timeSpan = document.createElement("div");
            timeSpan.className = "message-time";
            timeSpan.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.appendChild(timeSpan);
            msgContainer.appendChild(div);
        });
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function updateTitle() {
        const conv = getCurrentConv();
        convNameSpan.innerText = conv ? conv.title : "对话";
    }

    function showLoading() {
        let ld = document.getElementById("loadingMsg");
        if (!ld) {
            ld = document.createElement("div");
            ld.className = "message assistant-message";
            ld.id = "loadingMsg";
            ld.innerHTML = `<div class="loading-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
            msgContainer.appendChild(ld);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
    }
    function hideLoading() { document.getElementById("loadingMsg")?.remove(); }

    async function callAPI(messages) {
        if (!currentApiKey) throw new Error("请先保存 API Key");
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 120000);
        try {
            const res = await fetch(DEEPSEEK_API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${currentApiKey}` },
                body: JSON.stringify({ model: currentModel, messages, temperature: 0.7, max_tokens: 2000, stream: false }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!res.ok) {
                let err = `HTTP ${res.status}`;
                try { const j = await res.json(); err = j.error?.message || err; } catch(e) {}
                throw new Error(err);
            }
            const data = await res.json();
            if (!data.choices?.[0]?.message?.content) throw new Error("回复为空");
            return data.choices[0].message.content;
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }

    async function sendMessage(text) {
        if (isLoading) { alert("请等待上一条回复完成"); return; }
        const conv = getCurrentConv();
        if (!conv) return;
        const oldMsgs = getCurrentMessages();
        const newUserMsg = { role: "user", content: text, history: [] };
        const updated = [...oldMsgs, newUserMsg];
        saveCurrentMessages(updated);
        isLoading = true;
        sendBtn.classList.add("disabled");
        showLoading();
        try {
            const apiMessages = updated.map(m => ({ role: m.role, content: m.content }));
            const reply = await callAPI(apiMessages);
            hideLoading();
            const newAssistantMsg = { role: "assistant", content: reply, history: [] };
            const final = [...updated, newAssistantMsg];
            saveCurrentMessages(final);
        } catch (err) {
            hideLoading();
            const errMsg = err.message || "调用失败";
            const errMsgObj = { role: "assistant", content: `⚠️ 错误：${errMsg}`, history: [] };
            const final = [...updated, errMsgObj];
            saveCurrentMessages(final);
            if (errMsg.includes("Insufficient Balance")) alert("余额不足");
            else if (errMsg.includes("API Key")) alert("API Key 无效");
        } finally {
            isLoading = false;
            sendBtn.classList.remove("disabled");
        }
    }

    async function regenerateAfterEdit(messagesWithoutAssistant) {
        if (isLoading) return;
        isLoading = true;
        sendBtn.classList.add("disabled");
        showLoading();
        try {
            const apiMessages = messagesWithoutAssistant.map(m => ({ role: m.role, content: m.content }));
            const reply = await callAPI(apiMessages);
            hideLoading();
            const newAssistant = { role: "assistant", content: reply, history: [] };
            const final = [...messagesWithoutAssistant, newAssistant];
            saveCurrentMessages(final);
        } catch (err) {
            hideLoading();
            const errMsg = err.message || "调用失败";
            const errAssistant = { role: "assistant", content: `⚠️ 错误：${errMsg}`, history: [] };
            const final = [...messagesWithoutAssistant, errAssistant];
            saveCurrentMessages(final);
        } finally {
            isLoading = false;
            sendBtn.classList.remove("disabled");
        }
    }

    async function regenerateLastAssistant() {
        if (isLoading) return;
        const messages = getCurrentMessages();
        let lastAssistantIdx = -1;
        for (let i = messages.length-1; i>=0; i--) {
            if (messages[i].role === "assistant") { lastAssistantIdx = i; break; }
        }
        if (lastAssistantIdx === -1) { alert("没有可重新生成的消息"); return; }
        const assistantMsg = messages[lastAssistantIdx];
        pushHistory(assistantMsg, assistantMsg.content);
        const truncated = messages.slice(0, lastAssistantIdx);
        saveCurrentMessages(truncated);
        await regenerateAfterEdit(truncated);
    }

    function showMessageHistory(idx, currentContent, historyArray) {
        historyListUl.innerHTML = "";
        const allVersions = [...historyArray, currentContent];
        if (allVersions.length === 0) {
            historyListUl.innerHTML = "<li>无历史版本</li>";
        } else {
            allVersions.forEach((ver, i) => {
                const li = document.createElement("li");
                const span = document.createElement("span");
                span.className = "version-title";
                const isCurrent = (i === allVersions.length-1);
                span.innerText = `版本 ${i+1}${isCurrent ? " (当前)" : ""}`;
                span.onclick = () => {
                    if (isCurrent) return;
                    const messages = getCurrentMessages();
                    if (idx < messages.length) {
                        const currentMsg = messages[idx];
                        pushHistory(currentMsg, currentMsg.content);
                        currentMsg.content = ver;
                        saveCurrentMessages(messages);
                        msgHistoryModal.style.display = "none";
                    }
                };
                li.appendChild(span);
                historyListUl.appendChild(li);
            });
        }
        msgHistoryModal.style.display = "flex";
    }

    // 保留最近2轮并清除历史
    function keepLastTwoRoundsAndClearHistory() {
        if (isLoading) { alert("请等待当前回复完成"); return; }
        const conv = getCurrentConv();
        if (!conv) return;
        let messages = conv.messages;
        if (messages.length === 0) { alert("没有消息可精简"); return; }
        
        const systemMsgs = messages.filter(m => m.role === "system");
        const nonSystem = messages.filter(m => m.role !== "system");
        const keepCount = 4; // 2轮 = 4条消息
        let keptNonSystem = nonSystem.slice(-keepCount);
        
        const newMessages = [...systemMsgs, ...keptNonSystem];
        const finalMessages = newMessages.map(m => ({
            role: m.role,
            content: m.content,
            history: []
        }));
        
        conv.messages = finalMessages;
        conv.versionStack = [JSON.parse(JSON.stringify(finalMessages))];
        conv.currentVersionIndex = 0;
        if (!conv.title.includes("(精简2轮)")) {
            conv.title = conv.title + " (精简2轮)";
        }
        saveAll();
        renderMessages();
        updateTitle();
        alert(`已保留最近2轮对话（共${keptNonSystem.length}条消息），并清除了所有历史版本。导出的备份将只包含这些内容。`);
    }

    // 对话管理
    function switchConversation(id) {
        if (isLoading) { alert("请等待完成"); return; }
        activeConvId = id;
        saveAll();
        updateTitle();
        renderMessages();
    }
    function newConversation() {
        if (isLoading) return;
        const newId = Date.now();
        conversations.push({ id: newId, title: "新对话", messages: [], versionStack: [], currentVersionIndex: 0 });
        activeConvId = newId;
        saveAll();
        updateTitle();
        renderMessages();
        closeModalPanel();
    }
    function deleteConversation(id) {
        if (conversations.length === 1) { alert("至少保留一个对话"); return; }
        const idx = conversations.findIndex(c => c.id === id);
        if (idx !== -1) {
            conversations.splice(idx, 1);
            if (activeConvId === id) activeConvId = conversations[0].id;
            saveAll();
            updateTitle();
            renderMessages();
            closeModalPanel();
        }
    }
    function refreshConvList() {
        convListUl.innerHTML = "";
        conversations.forEach(c => {
            const li = document.createElement("li");
            const span = document.createElement("span");
            span.className = "conv-title";
            span.innerText = c.title || "对话";
            span.onclick = () => { switchConversation(c.id); closeModalPanel(); };
            const del = document.createElement("button");
            del.className = "del-conv";
            del.innerText = "🗑️";
            del.onclick = (e) => { e.stopPropagation(); if(confirm("删除对话？")) deleteConversation(c.id); };
            li.appendChild(span);
            li.appendChild(del);
            convListUl.appendChild(li);
        });
    }
    function openModalPanel() { refreshConvList(); convModal.style.display = "flex"; }
    function closeModalPanel() { convModal.style.display = "none"; }
    function closeHistoryModalPanel() { msgHistoryModal.style.display = "none"; }

    function exportBackup() {
        const dataStr = JSON.stringify(conversations);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `deepseek_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("备份已导出");
    }
    function importBackup() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported) && imported.length) {
                        conversations = imported.map(c => normalizeConversation(c));
                        saveAll();
                        if (!activeConvId || !conversations.some(c => c.id === activeConvId)) activeConvId = conversations[0].id;
                        renderMessages();
                        updateTitle();
                        alert("导入成功");
                    } else alert("格式错误");
                } catch(err) { alert("解析失败"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // API Key 管理
    function loadApiKey() {
        const saved = localStorage.getItem("deepseek_api_key");
        if (saved) {
            apiInput.value = saved;
            currentApiKey = saved;
        } else {
            apiInput.value = "";
            currentApiKey = "";
        }
    }
    function saveApiKey() {
        const newKey = apiInput.value.trim();
        if (newKey === "") {
            if (confirm("清除 API Key？")) {
                localStorage.removeItem("deepseek_api_key");
                currentApiKey = "";
                apiInput.value = "";
                alert("已清除");
            }
        } else {
            localStorage.setItem("deepseek_api_key", newKey);
            currentApiKey = newKey;
            alert("✅ API Key 已保存");
        }
    }

    function initDeepThinkToggle() {
        const savedMode = localStorage.getItem("deepthink_mode");
        if (savedMode === "true") { toggleDeep.checked = true; currentModel = "deepseek-reasoner"; }
        else { toggleDeep.checked = false; currentModel = "deepseek-chat"; }
        toggleDeep.addEventListener("change", (e) => {
            if (e.target.checked) { currentModel = "deepseek-reasoner"; localStorage.setItem("deepthink_mode", "true"); }
            else { currentModel = "deepseek-chat"; localStorage.setItem("deepthink_mode", "false"); }
            const tip = document.createElement("div");
            tip.style.position = "fixed"; tip.style.bottom = "70px"; tip.style.left = "20px";
            tip.style.background = "#1f7e8c"; tip.style.color = "white"; tip.style.padding = "6px 12px";
            tip.style.borderRadius = "20px"; tip.style.fontSize = "0.7rem"; tip.style.zIndex = "999";
            tip.innerText = `已切换至 ${currentModel === "deepseek-reasoner" ? "深度思考(R1)" : "普通模式(V3)"}`;
            document.body.appendChild(tip);
            setTimeout(() => tip.remove(), 1500);
        });
    }

    function autoResizeTextarea() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(100, userInput.scrollHeight) + 'px';
    }

    function bindEvents() {
        sendBtn.addEventListener("click", () => {
            const text = userInput.value.trim();
            if (text && !isLoading) {
                userInput.value = "";
                userInput.style.height = "auto";
                sendMessage(text);
            }
        });
        saveApiBtn.addEventListener("click", saveApiKey);
        newConvBtn.addEventListener("click", newConversation);
        keepTwoRoundsBtn.addEventListener("click", () => {
            if (confirm("⚠️ 此操作将删除当前对话中超过最近2轮的所有消息，并清除所有历史版本。建议先点击「💾 备份」。是否继续？")) {
                keepLastTwoRoundsAndClearHistory();
            }
        });
        showConvListBtn.addEventListener("click", openModalPanel);
        closeModalBtn.addEventListener("click", closeModalPanel);
        modalNewConvBtn.addEventListener("click", () => { newConversation(); closeModalPanel(); });
        exportBackupBtn.addEventListener("click", exportBackup);
        importBackupBtn.addEventListener("click", importBackup);
        closeHistoryModalBtn.addEventListener("click", closeHistoryModalPanel);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                const text = userInput.value.trim();
                if (text && !isLoading) {
                    userInput.value = "";
                    userInput.style.height = "auto";
                    sendMessage(text);
                }
            }
        });
        userInput.addEventListener("input", autoResizeTextarea);
        window.addEventListener("click", (e) => { if (e.target === convModal) closeModalPanel(); if (e.target === msgHistoryModal) closeHistoryModalPanel(); if (e.target === editModal) closeEditModal(); });
        editConfirmBtn.addEventListener("click", confirmEdit);
        editCancelBtn.addEventListener("click", closeEditModal);
    }

    function bootstrap() {
        loadApiKey();
        loadAllData();
        initDeepThinkToggle();
        bindEvents();
        setTimeout(() => {
            const saved = localStorage.getItem("deepseek_api_key");
            if (saved && apiInput.value !== saved) {
                apiInput.value = saved;
                currentApiKey = saved;
            }
        }, 100);
    }
    bootstrap();
})();
</script>
</body>
</html>
