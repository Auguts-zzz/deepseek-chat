<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek 对话历史版本（支持撤销/恢复/分支）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #e9eef4;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        .app {
            max-width: 100%;
            width: 100%;
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }

        .top-bar {
            background: #ffffffdd;
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
        }
        .conv-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f2f5;
            border-radius: 40px;
            padding: 4px 12px;
        }
        .conv-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f5e6e;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        .icon-btn:active {
            background: #e0e4ea;
        }
        .history-nav {
            display: flex;
            gap: 4px;
            background: #f0f2f5;
            border-radius: 40px;
            padding: 2px 8px;
        }
        .api-section {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .api-input {
            background: #f0f2f5;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            width: 140px;
            font-family: monospace;
        }
        .small-btn {
            background: #eef2f7;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .mode-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #eef2f7;
            padding: 0 10px;
            border-radius: 40px;
            height: 32px;
            font-size: 0.7rem;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fefefe;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 22px;
            line-height: 1.45;
            font-size: 0.9rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
        }
        .user-message .bubble {
            background: #1f7e8c;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .assistant-message .bubble {
            background: #eef2fa;
            color: #1a2c3e;
            border-bottom-left-radius: 6px;
        }
        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            margin-left: 12px;
            font-size: 0.65rem;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: #6c7a91;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:active {
            background: #e2e8f0;
        }
        .message-time {
            font-size: 0.55rem;
            color: #8d9aae;
            margin-top: 4px;
            margin-left: 12px;
        }
        .loading-bubble {
            background: #eef2fa;
            padding: 10px 16px;
            border-radius: 24px;
            display: flex;
            gap: 6px;
            width: fit-content;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #8f9bb3;
            border-radius: 50%;
            animation: wave 1.2s infinite;
        }
        @keyframes wave {
            0%,60%,100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        .input-area {
            background: white;
            border-top: 1px solid #eef2f0;
            padding: 12px 16px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: #f4f7fb;
            border-radius: 32px;
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
        }
        textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            max-height: 100px;
        }
        .send-btn {
            background: #1f7e8c;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
        }
        .send-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 28px;
            padding: 20px;
            max-height: 70%;
            overflow-y: auto;
        }
        .modal-header {
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .conv-list, .version-list {
            list-style: none;
        }
        .conv-list li, .version-list li {
            padding: 12px 8px;
            border-bottom: 1px solid #eef2f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conv-title, .version-title {
            cursor: pointer;
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .del-conv {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #c23d3d;
            padding: 0 8px;
        }
        .new-conv-btn {
            background: #1f7e8c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px;
            width: 100%;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .footer-note {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px;
            color: #95a5bc;
            background: #ffffffcc;
        }
        @media (max-width: 550px) {
            .api-input { width: 110px; }
            .conv-name { max-width: 120px; }
            .message-actions { gap: 6px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="conv-control">
            <button id="showConvListBtn" class="icon-btn">📋</button>
            <span id="currentConvName" class="conv-name">加载中...</span>
            <button id="newConvBtn" class="icon-btn">➕</button>
            <div class="history-nav">
                <button id="undoVersionBtn" class="icon-btn" title="上一个版本">⏪</button>
                <button id="redoVersionBtn" class="icon-btn" title="下一个版本">⏩</button>
                <button id="showVersionListBtn" class="icon-btn" title="历史版本列表">🕘</button>
            </div>
        </div>
        <div class="api-section">
            <input type="password" id="apiKeyInput" class="api-input" placeholder="API Key">
            <button id="saveApiBtn" class="small-btn">保存</button>
            <div class="mode-switch">
                <span>🧠 深度思考</span>
                <input type="checkbox" id="deepThinkToggle">
            </div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant-message">
            <div class="bubble">✨ 欢迎！现在支持历史版本管理。<br>📌 每次编辑/重试/发送都会自动保存快照。使用⏪⏩浏览历史版本，可基于任意版本继续对话。</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
        </div>
        <button id="sendButton" class="send-btn">➤</button>
    </div>
    <div class="footer-note">
        🔒 API Key 仅存本地 | 多对话独立记忆 | 支持版本回溯与分支
    </div>
</div>

<!-- 对话列表模态框 -->
<div id="convModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>📁 我的对话</span>
            <button id="closeModalBtn" class="icon-btn" style="background:none;">✖️</button>
        </div>
        <ul id="convListUl" class="conv-list"></ul>
        <button id="modalNewConvBtn" class="new-conv-btn">➕ 新建对话</button>
    </div>
</div>

<!-- 版本列表模态框 -->
<div id="versionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>🕘 历史版本</span>
            <button id="closeVersionModalBtn" class="icon-btn" style="background:none;">✖️</button>
        </div>
        <ul id="versionListUl" class="version-list"></ul>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const SYSTEM_MESSAGE = { role: "system", content: "你是DeepSeek助手，现在扮演用户指定的角色进行对话。请保持角色一致性，根据上下文自然回复。使用中文。" };

    let conversations = [];         // 每个对话: { id, title, versionStack, currentVersionIndex }
    let activeConvId = null;
    let currentApiKey = "";
    let currentModel = "deepseek-chat";
    let isLoading = false;

    // DOM 元素
    const messagesContainer = document.getElementById("messagesContainer");
    const userInputEl = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const saveApiBtn = document.getElementById("saveApiBtn");
    const deepThinkToggle = document.getElementById("deepThinkToggle");
    const currentConvNameSpan = document.getElementById("currentConvName");
    const showConvListBtn = document.getElementById("showConvListBtn");
    const newConvBtn = document.getElementById("newConvBtn");
    const undoVersionBtn = document.getElementById("undoVersionBtn");
    const redoVersionBtn = document.getElementById("redoVersionBtn");
    const showVersionListBtn = document.getElementById("showVersionListBtn");
    const convModal = document.getElementById("convModal");
    const versionModal = document.getElementById("versionModal");
    const convListUl = document.getElementById("convListUl");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalNewConvBtn = document.getElementById("modalNewConvBtn");
    const closeVersionModalBtn = document.getElementById("closeVersionModalBtn");
    const versionListUl = document.getElementById("versionListUl");

    // ==================== 辅助函数：版本管理 ====================
    // 获取当前对话对象
    function getCurrentConv() {
        return conversations.find(c => c.id === activeConvId);
    }

    // 保存当前对话的版本栈到 localStorage
    function saveConv(conv) {
        // 直接保存 conversations 整体会由 saveAllData 处理，这里只做部分更新
        saveAllData();
    }

    // 保存当前快照（将当前消息列表压入版本栈，并更新索引）
    function saveSnapshot(conv, newMessages) {
        if (!conv) return;
        // 如果当前索引不是最后一个版本，则删除之后的所有版本（分支逻辑）
        if (conv.currentVersionIndex < conv.versionStack.length - 1) {
            conv.versionStack = conv.versionStack.slice(0, conv.currentVersionIndex + 1);
        }
        conv.versionStack.push(JSON.parse(JSON.stringify(newMessages))); // 深拷贝
        conv.currentVersionIndex = conv.versionStack.length - 1;
        // 限制版本数量最多50
        if (conv.versionStack.length > 50) {
            conv.versionStack.shift();
            conv.currentVersionIndex--;
        }
        saveAllData();
    }

    // 恢复到指定版本索引
    function restoreVersion(conv, index) {
        if (!conv || index < 0 || index >= conv.versionStack.length) return false;
        conv.currentVersionIndex = index;
        saveAllData();
        renderMessages();   // 重新渲染
        return true;
    }

    // 获取当前显示的消息列表（根据版本索引）
    function getCurrentMessages() {
        const conv = getCurrentConv();
        if (!conv || conv.versionStack.length === 0) return [SYSTEM_MESSAGE];
        return conv.versionStack[conv.currentVersionIndex];
    }

    // 保存当前消息列表（会创建新版本）——用于发送新消息、编辑、重试后
    function saveCurrentMessagesAndSnapshot(messages) {
        const conv = getCurrentConv();
        if (!conv) return;
        // 直接替换当前版本栈的当前项（不创建新版本，因为要保留历史）
        // 但通常我们会先调用 saveSnapshot 来保存修改前的状态，然后再更新当前项。
        // 这里提供一个更安全的方式：先保存快照（自动分支），然后替换当前版本的消息。
        // 但为了避免重复快照，我们直接在修改后调用 replaceCurrentVersion
        if (conv.versionStack.length === 0) {
            conv.versionStack.push(JSON.parse(JSON.stringify(messages)));
            conv.currentVersionIndex = 0;
        } else {
            // 如果当前索引不是最后一个，先截断
            if (conv.currentVersionIndex < conv.versionStack.length - 1) {
                conv.versionStack = conv.versionStack.slice(0, conv.currentVersionIndex + 1);
            }
            // 替换当前版本
            conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(messages));
        }
        saveAllData();
        renderMessages();
    }

    // 新发送消息：先保存当前快照（旧状态），然后添加用户消息和AI回复，最后保存为新版本（实际是替换当前版本并递增索引）
    async function sendMessageWithHistory(text) {
        if (isLoading) return;
        const conv = getCurrentConv();
        if (!conv) return;
        // 保存当前状态快照（以便撤销）
        const oldMessages = getCurrentMessages();
        saveSnapshot(conv, oldMessages);
        // 添加用户消息
        const currentMsgs = getCurrentMessages();
        const newUserMsg = { role: "user", content: text };
        const updatedMsgs = [...currentMsgs, newUserMsg];
        // 直接更新当前版本（不额外保存快照，因为已经保存了旧快照）
        conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(updatedMsgs));
        saveAllData();
        renderMessages();

        isLoading = true;
        sendButton.classList.add("disabled");
        showLoading();

        try {
            const assistantReply = await callAPIWithMessages(updatedMsgs);
            hideLoading();
            const finalMsgs = [...updatedMsgs, { role: "assistant", content: assistantReply }];
            // 替换当前版本为最终消息
            conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(finalMsgs));
            saveAllData();
            renderMessages();
        } catch (err) {
            hideLoading();
            const errorMsg = err.message || "调用失败";
            const errMsgs = [...updatedMsgs, { role: "assistant", content: `⚠️ 错误：${errorMsg}` }];
            conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(errMsgs));
            saveAllData();
            renderMessages();
            if(errorMsg.includes("Insufficient Balance")) alert("API 余额不足");
            else if(errorMsg.includes("API Key")) alert("API Key 无效");
        } finally {
            isLoading = false;
            sendButton.classList.remove("disabled");
        }
    }

    // 编辑用户消息：保存快照，修改消息并截断后续，然后重新生成AI回复
    async function editUserMessage(msgIndex, oldContent) {
        if(isLoading) return;
        const newContent = prompt("编辑消息内容:", oldContent);
        if(newContent === null || newContent.trim() === "") return;
        const conv = getCurrentConv();
        if (!conv) return;
        // 保存当前快照
        const currentMsgs = getCurrentMessages();
        saveSnapshot(conv, currentMsgs);
        // 找到实际消息索引
        const displayMsgs = currentMsgs.filter(m => m.role !== "system");
        if(msgIndex >= displayMsgs.length) return;
        let realIndex = -1;
        let userCount = -1;
        for(let i=0; i<currentMsgs.length; i++) {
            if(currentMsgs[i].role !== "system") userCount++;
            if(userCount === msgIndex && currentMsgs[i].role === "user") {
                realIndex = i;
                break;
            }
        }
        if(realIndex === -1) return;
        const newMessages = currentMsgs.slice(0, realIndex);
        newMessages.push({ role: "user", content: newContent.trim() });
        // 更新当前版本
        conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(newMessages));
        saveAllData();
        renderMessages();
        // 重新生成AI回复
        await regenerateAfterEdit(newMessages);
    }

    async function regenerateAfterEdit(messagesWithoutAssistant) {
        if(isLoading) return;
        isLoading = true;
        sendButton.classList.add("disabled");
        showLoading();
        try {
            const assistantReply = await callAPIWithMessages(messagesWithoutAssistant);
            hideLoading();
            const finalMsgs = [...messagesWithoutAssistant, { role: "assistant", content: assistantReply }];
            const conv = getCurrentConv();
            if(conv) {
                conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(finalMsgs));
                saveAllData();
                renderMessages();
            }
        } catch (err) {
            hideLoading();
            const errorMsg = err.message || "调用失败";
            const errMsgs = [...messagesWithoutAssistant, { role: "assistant", content: `⚠️ 错误：${errorMsg}` }];
            const conv = getCurrentConv();
            if(conv) {
                conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(errMsgs));
                saveAllData();
                renderMessages();
            }
        } finally {
            isLoading = false;
            sendButton.classList.remove("disabled");
        }
    }

    // 重新生成最后一条助手消息
    async function regenerateLastAssistant() {
        if(isLoading) return;
        const conv = getCurrentConv();
        if(!conv) return;
        const currentMsgs = getCurrentMessages();
        let lastAssistantIndex = -1;
        for(let i=currentMsgs.length-1; i>=0; i--) {
            if(currentMsgs[i].role === "assistant") {
                lastAssistantIndex = i;
                break;
            }
        }
        if(lastAssistantIndex === -1) {
            alert("没有可重新生成的助手消息");
            return;
        }
        // 保存快照
        saveSnapshot(conv, currentMsgs);
        const newMsgs = currentMsgs.slice(0, lastAssistantIndex);
        conv.versionStack[conv.currentVersionIndex] = JSON.parse(JSON.stringify(newMsgs));
        saveAllData();
        renderMessages();
        await regenerateAfterEdit(newMsgs);
    }

    // 通用API调用
    async function callAPIWithMessages(messages) {
        if(!currentApiKey) throw new Error("❌ 请先保存 API Key");
        const response = await fetch(DEEPSEEK_API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${currentApiKey}`
            },
            body: JSON.stringify({
                model: currentModel,
                messages: messages,
                temperature: 0.7,
                max_tokens: 2000,
                stream: false
            })
        });
        if(!response.ok) {
            let errMsg = `HTTP ${response.status}`;
            try { const errJson = await response.json(); errMsg = errJson.error?.message || errMsg; } catch(e) {}
            throw new Error(errMsg);
        }
        const data = await response.json();
        if(!data.choices?.[0]?.message?.content) throw new Error("回复为空");
        return data.choices[0].message.content;
    }

    // ==================== 渲染消息（带编辑/重试/复制） ====================
    function renderMessages() {
        const messages = getCurrentMessages();
        const displayMsgs = messages.filter(m => m.role !== "system");
        messagesContainer.innerHTML = "";
        if(displayMsgs.length === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "message assistant-message";
            emptyDiv.innerHTML = `<div class="bubble">💬 暂无消息，开始对话～</div>`;
            messagesContainer.appendChild(emptyDiv);
        } else {
            displayMsgs.forEach((msg, idx) => {
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${msg.role === "user" ? "user-message" : "assistant-message"}`;
                const bubbleDiv = document.createElement("div");
                bubbleDiv.className = "bubble";
                bubbleDiv.innerText = msg.content;
                msgDiv.appendChild(bubbleDiv);
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "message-actions";
                const copyBtn = document.createElement("button");
                copyBtn.className = "action-btn";
                copyBtn.innerHTML = "📋 复制";
                copyBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await navigator.clipboard.writeText(msg.content);
                    copyBtn.innerHTML = "✅ 已复制";
                    setTimeout(() => { copyBtn.innerHTML = "📋 复制"; }, 1000);
                };
                actionsDiv.appendChild(copyBtn);
                if(msg.role === "user") {
                    const editBtn = document.createElement("button");
                    editBtn.className = "action-btn";
                    editBtn.innerHTML = "✏️ 编辑";
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        editUserMessage(idx, msg.content);
                    };
                    actionsDiv.appendChild(editBtn);
                }
                if(msg.role === "assistant") {
                    const lastAssistantIndex = displayMsgs.reduce((last, m, i) => m.role === "assistant" ? i : last, -1);
                    if(idx === lastAssistantIndex) {
                        const regenBtn = document.createElement("button");
                        regenBtn.className = "action-btn";
                        regenBtn.innerHTML = "🔄 重新生成";
                        regenBtn.onclick = (e) => {
                            e.stopPropagation();
                            regenerateLastAssistant();
                        };
                        actionsDiv.appendChild(regenBtn);
                    }
                }
                msgDiv.appendChild(actionsDiv);
                const timeSpan = document.createElement("div");
                timeSpan.className = "message-time";
                timeSpan.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                msgDiv.appendChild(timeSpan);
                messagesContainer.appendChild(msgDiv);
            });
        }
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 加载/保存指示
    function showLoading() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message assistant-message";
        loadingDiv.id = "loadingMsg";
        loadingDiv.innerHTML = `<div class="loading-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    function hideLoading() {
        const el = document.getElementById("loadingMsg");
        if(el) el.remove();
    }

    // ==================== 对话管理 ====================
    function saveAllData() {
        localStorage.setItem("ds_conversations", JSON.stringify(conversations));
        localStorage.setItem("ds_activeConvId", activeConvId);
    }

    function loadAllData() {
        const savedConvs = localStorage.getItem("ds_conversations");
        if(savedConvs) {
            conversations = JSON.parse(savedConvs);
            // 确保每个对话有 versionStack 和 currentVersionIndex
            conversations.forEach(conv => {
                if(!conv.versionStack || conv.versionStack.length === 0) {
                    let initialMsgs = [SYSTEM_MESSAGE];
                    if(conv.messages && conv.messages.length) initialMsgs = conv.messages;
                    conv.versionStack = [JSON.parse(JSON.stringify(initialMsgs))];
                    conv.currentVersionIndex = 0;
                    delete conv.messages; // 清理旧字段
                }
                if(conv.currentVersionIndex === undefined) conv.currentVersionIndex = 0;
            });
        } else {
            // 创建默认对话
            const defaultConv = {
                id: Date.now(),
                title: "新对话",
                versionStack: [[SYSTEM_MESSAGE]],
                currentVersionIndex: 0
            };
            conversations = [defaultConv];
        }
        const savedActive = localStorage.getItem("ds_activeConvId");
        if(savedActive && conversations.some(c => c.id == savedActive)) activeConvId = parseInt(savedActive);
        else activeConvId = conversations[0].id;
        updateCurrentTitle();
    }

    function updateCurrentTitle() {
        const conv = getCurrentConv();
        if(conv) {
            let title = conv.title || "未命名";
            // 如果有版本信息，显示版本位置
            const idx = conv.currentVersionIndex;
            const total = conv.versionStack.length;
            currentConvNameSpan.innerText = `${title} (${idx+1}/${total})`;
        } else {
            currentConvNameSpan.innerText = "对话";
        }
    }

    // 切换对话
    function switchConversation(convId) {
        if(isLoading) { alert("请等待当前回复完成"); return; }
        activeConvId = convId;
        saveAllData();
        updateCurrentTitle();
        renderMessages();
    }

    function createNewConversation() {
        if(isLoading) { alert("请等待当前回复完成"); return; }
        const newId = Date.now();
        const newConv = {
            id: newId,
            title: "新对话",
            versionStack: [[SYSTEM_MESSAGE]],
            currentVersionIndex: 0
        };
        conversations.push(newConv);
        activeConvId = newId;
        saveAllData();
        updateCurrentTitle();
        renderMessages();
        closeModal();
    }

    function deleteConversation(convId) {
        if(conversations.length === 1) { alert("至少保留一个对话"); return; }
        const idx = conversations.findIndex(c => c.id === convId);
        if(idx !== -1) {
            conversations.splice(idx, 1);
            if(activeConvId === convId) activeConvId = conversations[0].id;
            saveAllData();
            updateCurrentTitle();
            renderMessages();
            closeModal();
        }
    }

    function refreshConvModal() {
        convListUl.innerHTML = "";
        conversations.forEach(conv => {
            const li = document.createElement("li");
            const titleSpan = document.createElement("span");
            titleSpan.className = "conv-title";
            titleSpan.innerText = conv.title || "未命名";
            titleSpan.onclick = () => { switchConversation(conv.id); closeModal(); };
            const delBtn = document.createElement("button");
            delBtn.className = "del-conv";
            delBtn.innerText = "🗑️";
            delBtn.onclick = (e) => { e.stopPropagation(); if(confirm(`删除对话“${conv.title}”？`)) deleteConversation(conv.id); };
            li.appendChild(titleSpan);
            li.appendChild(delBtn);
            convListUl.appendChild(li);
        });
    }

    function openModal() { refreshConvModal(); convModal.style.display = "flex"; }
    function closeModal() { convModal.style.display = "none"; }
